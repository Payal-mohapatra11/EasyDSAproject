<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Edit Profile | EasyDSA</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-50">

{% include "header.html" %}

<section class="py-16">
  <div class="max-w-xl mx-auto bg-white rounded-2xl shadow p-8">

    <h2 class="text-2xl font-bold text-gray-800 mb-6 text-center">
      Edit Profile
    </h2>

    <form method="POST" class="space-y-5">
      {% csrf_token %}

      <div>
        <label class="block text-sm font-medium mb-1">Username</label>
        {{ form.full_name }}

  {% if form.instance.full_name %}
  <p class="text-xs text-gray-500 mt-1">
    Username cannot be changed.
  </p>
  {% endif %}
      </div>

      <div>
        <label class="block text-sm font-medium mb-1">Phone Number</label>
        {{ form.phone }}
      </div>

      <div class="flex justify-between items-center mt-6">
        <a href="{% url 'profile' %}" class="text-gray-600 hover:underline">
          Cancel
        </a>

        <button type="submit"
          class="px-6 py-2 bg-indigo-600 text-white rounded-lg hover:bg-indigo-700 transition">
          Save Changes
        </button>
      </div>
    </form>

  </div>
</section>

{% include "footer.html" %}

<script>
document.addEventListener("DOMContentLoaded", function () {

    const usernameField = document.querySelector("input[name='full_name']");

    if (usernameField && usernameField.value.trim() !== "") {
        usernameField.setAttribute("readonly", true);
        usernameField.classList.add("bg-gray-100", "cursor-not-allowed");
    }

});
</script>

</body>
</html>
